<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watch Ads</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="../style.css">

</head>


<body>


<div class="container">


<div class="header">

<h2>🎥 Watch Ads</h2>

<p>Earn money by watching ads</p>

</div>



<div class="balance-card">

<h3>Your Balance</h3>

<h1>
৳ <span id="balance">0.00</span>
</h1>

</div>



<div class="balance-card">


<h3 id="adStatus">
Ready for Ad
</h3>


<button class="verify-btn" onclick="watchAd()">

▶ Watch Ad

</button>


</div>



</div>



<script>


let balance =
localStorage.getItem("balance") || 0;


document.getElementById("balance").innerHTML =
Number(balance).toFixed(2);



function watchAd(){


let button =
event.target;


button.disabled=true;


document.getElementById("adStatus").innerHTML =
"Watching Ad...";


setTimeout(function(){


let reward = 0.50;


let balance =
localStorage.getItem("balance") || 0;


balance =
Number(balance)+reward;


localStorage.setItem(
"balance",
balance
);



document.getElementById("balance").innerHTML =
balance.toFixed(2);



document.getElementById("adStatus").innerHTML =
"✅ Ad Completed +৳0.50";


button.disabled=false;


},10000);



}


</script>


</body>

</html>
