<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Make Money Online</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="homePage" class="page">

    <h2>💰 Make Money Online</h2>

    <p id="userName">Loading...</p>

    <div class="balance-card">
        <h3>Balance</h3>
        <h1>৳ <span id="balance">0</span></h1>
    </div>

    <div class="daily-bonus">
        <button id="claimBonusBtn">
            🎁 Claim Daily Bonus
        </button>

        <p id="bonusStatus"></p>
    </div>

</div>

<!-- TASKS -->
<div id="taskPage" class="page" style="display:none;">
    <h2>📋 Tasks</h2>
</div>

<!-- REFER -->
<div id="referPage" class="page" style="display:none;">

    <h2>👥 Refer & Earn</h2>

    <input id="referralLink" readonly>

    <button id="copyReferral">
        Copy Referral Link
    </button>

</div>

<!-- WALLET -->
<div id="walletPage" class="page" style="display:none;">

    <h2>💳 Wallet</h2>

    <h1 id="walletBalance">0</h1>

    <button>
        Withdraw
    </button>

</div>

<!-- PROFILE -->
<div id="profilePage" class="page" style="display:none;">

    <h2>👤 Profile</h2>

    <p>Name : <span id="profileName"></span></p>

    <p>ID : <span id="userId"></span></p>

</div>

<!-- Bottom Navigation -->
<nav class="bottom-nav">

<button class="nav-btn active" id="homeBtn">🏠<br>Home</button>

<button class="nav-btn" id="taskBtn">📋<br>Tasks</button>

<button class="nav-btn" id="referBtn">👥<br>Refer</button>

<button class="nav-btn" id="walletBtn">💳<br>Wallet</button>

<button class="nav-btn" id="profileBtn">👤<br>Profile</button>

</nav>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>

</body>
</html>
