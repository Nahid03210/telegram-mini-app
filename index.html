<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Earn Cash BD</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0f172a;
      color:white;
      text-align:center;
      padding:30px;
    }

    .card{
      max-width:350px;
      margin:auto;
      background:#1e293b;
      padding:20px;
      border-radius:15px;
    }

    h1{
      color:#38bdf8;
    }

    button{
      width:100%;
      padding:15px;
      margin-top:15px;
      border:none;
      border-radius:10px;
      background:#22c55e;
      color:white;
      font-size:18px;
      cursor:pointer;
    }

    #name{
      margin:20px 0;
      font-size:20px;
    }
  </style>
</head>
<body>

<div class="card">

<h1>Earn Cash BD</h1>

<p id="name">Loading...</p>

<button onclick="startWork()">
Start Working
</button>

</div>

<script>

let tg = window.Telegram.WebApp;

tg.expand();

if(tg.initDataUnsafe.user){
document.getElementById("name").innerHTML =
"Welcome, " + tg.initDataUnsafe.user.first_name;
}else{
document.getElementById("name").innerHTML =
"Open this inside Telegram";
}

function startWork(){
alert("Congratulations! Mini App is working.");
}

</script>

</body>
</html>
