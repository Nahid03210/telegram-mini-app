<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earn Cash BD</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h2>💰 Earn Cash BD</h2>
        <p id="username">Loading...</p>
    </div>

    <div class="balance-card">
        <h3>Available Balance</h3>
        <h1>৳ <span id="balance">0.00</span></h1>
    </div>

    <div class="stats">

        <div class="box">
            <h4>Referral</h4>
            <p id="referral">0</p>
        </div>

        <div class="box">
            <h4>Total Earn</h4>
            <p>৳0</p>
        </div>

    </div>

    <div class="menu">

        <button onclick="watchAds()">
            ▶ Watch Ads
        </button>

        <button onclick="referralPage()">
            👥 Referral
        </button>

        <button onclick="withdrawPage()">
            💸 Withdraw
        </button>

        <button onclick="leaderboardPage()">
            🏆 Leaderboard
        </button>

        <button onclick="historyPage()">
            📜 History
        </button>

        <button onclick="profilePage()">
            ⚙ Profile
        </button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
