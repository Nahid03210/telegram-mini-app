<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Make Money Online</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="stylesheet" href="style.css">

</head>
<script type="module" src="firebase.js"></script>
<script src="script.js"></script>
<body>
<div id="joinScreen" class="join-screen">

    <div class="join-card">

        <h2>🔒 Join Required</h2>

        <p>
            Before using this app, please join our official Telegram channel.
        </p>

        <a href="https://t.me/makemoneyyourrhome" target="_blank">
            <button class="join-btn">
                Join Channel
            </button>
        </a>

        <button class="verify-btn" onclick="verifyJoin()">
            I've Joined
        </button>

    </div>

</div>
<div class="container">

<div class="header">

<h2>💰 Make Money Online</h2>

<p id="username">
Loading...
</p>

</div>

<div class="balance-card">

<h3>Available Balance</h3>

<h1>
৳ <span id="balance">0.00</span>
</h1>

<p class="balance-text">
Start watching ads to earn money
</p>

</div>

<div class="stats">

<div class="box">

<h4>Total Earn</h4>

<p id="earn">
৳0
</p>

</div>

<div class="box">

<h4>Referrals</h4>

<p id="referral">
0
</p>

</div>

</div>

<h3 class="section-title">
Quick Actions
</h3>

<div class="grid">

<button onclick="watchAds()">

🎥

<span>Watch Ads</span>

</button>

<button onclick="dailyBonus()">

🎁

<span>Daily Bonus</span>

</button>

<button onclick="referralPage()">

👥

<span>Referral</span>

</button>

<button onclick="withdrawPage()">

💸

<span>Withdraw</span>

</button>

<button onclick="leaderboardPage()">

🏆

<span>Leaderboard</span>

</button>

<button onclick="historyPage()">

📜

<span>History</span>

</button>

<button onclick="profilePage()">

⚙️

<span>Profile</span>

</button>

<button onclick="supportPage()">

💬

<span>Support</span>

</button>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>
</body>
</html>
